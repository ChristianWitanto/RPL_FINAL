<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistik Owner</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icon -->
    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Chart JS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        body{
            background-color:#f4f6f9;
        }

        .card-box{
            border:none;
            border-radius:20px;
            transition:0.3s;
        }

        .card-box:hover{
            transform:translateY(-5px);
        }

        .icon-box{
            font-size:45px;
            margin-bottom:10px;
        }

        .chart-card{
            border:none;
            border-radius:20px;
        }

    </style>

</head>
<body>

<div class="container py-5">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2 class="fw-bold">
            <i class="bi bi-bar-chart-fill"></i>
            Statistik Owner
        </h2>

        <a href="/owner" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i>
            Kembali
        </a>

    </div>

    <!-- Card Statistik -->
    <div class="row g-4 mb-4">

        <!-- Total Transaksi -->
        <div class="col-md-4">

            <div class="card shadow card-box text-center p-4">

                <div class="icon-box text-primary">
                    <i class="bi bi-receipt"></i>
                </div>

                <h5>Total Transaksi</h5>

                <h2 class="fw-bold">
                    {{ totalTransaksi }}
                </h2>

            </div>

        </div>

        <!-- Total Pembelian -->
        <div class="col-md-4">

            <div class="card shadow card-box text-center p-4">

                <div class="icon-box text-warning">
                    <i class="bi bi-cart-fill"></i>
                </div>

                <h5>Total Pembelian</h5>

                <h2 class="fw-bold">
                    {{ totalPembelian }}
                </h2>

            </div>

        </div>

        <!-- Total Pendapatan -->
        <div class="col-md-4">

            <div class="card shadow card-box text-center p-4">

                <div class="icon-box text-success">
                    <i class="bi bi-cash-stack"></i>
                </div>

                <h5>Total Pendapatan</h5>

                <h2 class="fw-bold text-success">
                    Rp {{ "{:,.0f}".format(totalPendapatan) }}
                </h2>

            </div>

        </div>

    </div>

    <!-- Grafik -->
    <div class="card shadow chart-card">

        <div class="card-header bg-primary text-white py-3">

            <h4 class="mb-0">
                <i class="bi bi-graph-up"></i>
                Grafik Pendapatan
            </h4>

        </div>

        <div class="card-body">

            <canvas id="grafik"></canvas>

        </div>

    </div>

</div>

<script>

new Chart(document.getElementById("grafik"), {

    type: 'bar',

    data: {

        labels: {{ bulan | tojson }},

        datasets: [{

            label: 'Pendapatan',

            data: {{ pendapatan | tojson }},

            backgroundColor: '#0d6efd',

            borderRadius: 10

        }]

    },

    options: {

        responsive: true,

        plugins: {

            legend: {
                display: true
            }

        }

    }

});

</script>

</body>
</html>
